<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>media-manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --card: #0e0e0e;
  --border: #1e1e1e;
  --text: #fff;
  --muted: #555;
  --muted2: #888;
  --accent: #7c6efa;
  --success: #00e676;
  --error: #ff1744;
  --warn: #ff9800;
  --fav: #ff3b5c;
  --ig: linear-gradient(135deg, #405de6 0%, #833ab4 40%, #c13584 70%, #fd1d1d 100%);
  --mega: #d9272e;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased; overscroll-behavior: none;
}
body { display: flex; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.header {
  flex-shrink: 0;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
  padding-top: max(14px, env(safe-area-inset-top, 14px));
  z-index: 10;
}
.wordmark {
  font-size: 11px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--muted2); margin-bottom: 10px; user-select: none;
}
.conn-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); margin-right: 6px; vertical-align: middle; transition: background 0.3s;
}
.conn-dot.live { background: var(--success); }
.conn-dot.dead { background: var(--error); }
.input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.url-input {
  flex: 1; min-width: 0; background: #161616; border: 1px solid var(--border); border-radius: 14px;
  color: var(--text); font-size: 15px; padding: 11px 14px; outline: none;
  transition: border-color 0.18s; -webkit-appearance: none;
}
.url-input:focus { border-color: var(--accent); }
.url-input::placeholder { color: var(--muted); }
.add-btn {
  flex-shrink: 0; background: var(--accent); border: none; border-radius: 14px;
  color: #fff; cursor: pointer; font-size: 22px; font-weight: 300; line-height: 1;
  padding: 9px 18px 11px;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.add-btn:active { opacity: 0.65; transform: scale(0.94); }
.add-btn:disabled { opacity: 0.4; }

/* Page tabs */
.page-tabs { display: flex; }
.page-tab {
  flex: 1; background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--muted2); cursor: pointer; font-size: 13px; font-weight: 600;
  padding: 9px 0; letter-spacing: 0.02em;
  transition: color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.page-tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── Content area ── */
.content-wrap { flex: 1; position: relative; overflow: hidden; }
.page { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

/* ── Jobs list ── */
.jobs { padding: 12px 12px 40px; display: flex; flex-direction: column; gap: 10px; }
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 72px 24px; gap: 12px; text-align: center;
}
.empty-icon { font-size: 40px; opacity: 0.2; }
.empty-text { font-size: 14px; color: var(--muted2); line-height: 1.7; }

/* ── Download card ── */
.card {
  background: var(--card); border-radius: 18px; border: 1px solid var(--border); overflow: hidden;
  animation: rise 0.28s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes rise {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card-body { padding: 14px 16px 10px; }
.card-top { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.badge { flex-shrink: 0; font-size: 10px; font-weight: 800; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 7px; }
.badge-ig   { background: var(--ig); color: #fff; }
.badge-mega { background: var(--mega); color: #fff; }
.badge-uk   { background: #1e1e1e; color: var(--muted2); }
.card-url { flex: 1; min-width: 0; font-size: 12px; color: var(--muted2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cancel-btn {
  flex-shrink: 0; background: #1e1e1e; border: none; border-radius: 50%;
  color: var(--muted2); cursor: pointer; font-size: 14px; line-height: 1;
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.cancel-btn:active { background: #2e1e1e; color: var(--error); }
.card-status { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.s-queued     .dot { background: #333; }
.s-downloading .dot { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
.s-done       .dot { background: var(--success); }
.s-failed     .dot { background: var(--error); }
.s-cancelled  .dot { background: var(--warn); }
@keyframes pulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(124,110,250,.5); }
  50% { opacity:.6; box-shadow:0 0 0 4px rgba(124,110,250,0); }
}
.status-label { font-size: 13px; font-weight: 600; }
.s-queued     .status-label { color: #444; }
.s-downloading .status-label { color: var(--accent); }
.s-done       .status-label { color: var(--success); }
.s-failed     .status-label { color: var(--error); }
.s-cancelled  .status-label { color: var(--warn); }
.files-pill { margin-left: auto; font-size: 11px; color: var(--muted2); background: #1a1a1a; border-radius: 20px; padding: 2px 8px; }
.card-msg { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-height: 15px; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
.pbar { height: 3px; background: #181818; overflow: hidden; }
.pfill { height: 100%; border-radius: 0 2px 2px 0; transition: width 0.35s ease; }
.s-queued     .pfill { background: #2a2a2a; width: 0%; }
.s-downloading .pfill { background: linear-gradient(90deg, var(--accent), #a855f7 80%); }
.s-done       .pfill { background: var(--success); width: 100% !important; transition: none; }
.s-failed     .pfill { background: var(--error); width: 100% !important; transition: none; }
.s-cancelled  .pfill { background: var(--warn); width: 100% !important; transition: none; }
.pfill.shimmer { width: 38% !important; animation: shimmer 1.6s ease-in-out infinite; }
@keyframes shimmer { 0% { transform:translateX(-160%); } 100% { transform:translateX(430%); } }
.browse-row {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  border-top: 1px solid var(--border); color: var(--muted2); font-size: 12px;
  cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: color 0.15s, background 0.15s;
}
.browse-row:active { color: var(--text); background: rgba(255,255,255,0.03); }
.browse-row svg { flex-shrink: 0; opacity: 0.6; }

/* ── Shared thumbnail grid ── */
.media-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.thumb { aspect-ratio: 1/1; overflow: hidden; position: relative; background: #111; cursor: pointer; }
.thumb img  { width:100%; height:100%; object-fit:cover; display:block; }
.thumb video { width:100%; height:100%; object-fit:cover; display:block; }
.thumb:active { opacity: 0.75; }
.play-badge { position:absolute; bottom:5px; right:5px; font-size:15px; pointer-events:none; filter:drop-shadow(0 1px 3px rgba(0,0,0,.8)); }

/* ── Favorites page ── */
.favs-empty {
  text-align: center; padding: 72px 24px; font-size: 14px; color: var(--muted2); line-height: 1.8;
}
.favs-empty-icon { font-size: 40px; display: block; opacity: 0.2; margin-bottom: 12px; }

/* ══════════════════════════════════════════════════════════════════════════════
   Media Browser overlay
   ══════════════════════════════════════════════════════════════════════════════ */
.browser {
  position: fixed; inset: 0; z-index: 50; background: var(--bg);
  display: flex; flex-direction: column;
  animation: br-up 0.32s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes br-up { from { transform:translateY(100%); } to { transform:translateY(0); } }
.br-header {
  flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; padding-top: max(14px, env(safe-area-inset-top, 14px));
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.br-back {
  flex-shrink: 0; background: none; border: none; color: var(--text); cursor: pointer;
  padding: 4px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; line-height:1;
}
.br-back:active { opacity: 0.5; }
.br-title { flex:1; min-width:0; }
.br-title-main { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.br-title-sub  { font-size:11px; color:var(--muted2); margin-top:1px; }
.br-count { flex-shrink:0; font-size:12px; color:var(--muted2); font-variant-numeric:tabular-nums; }
.br-tabs {
  flex-shrink:0; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; padding:8px 12px; border-bottom:1px solid var(--border);
}
.br-tabs::-webkit-scrollbar { display:none; }
.br-tab {
  flex-shrink:0; background:#1a1a1a; border:1px solid var(--border); border-radius:20px;
  color:var(--muted2); cursor:pointer; font-size:12px; font-weight:600; padding:5px 14px; white-space:nowrap;
  transition:background .15s,color .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
.br-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.br-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
.br-section {
  grid-column:1/-1; padding:10px 12px 5px;
  font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); background:var(--bg);
}
.br-empty  { grid-column:1/-1; text-align:center; padding:60px 20px; font-size:14px; color:var(--muted2); line-height:1.7; }
.br-loading { grid-column:1/-1; text-align:center; padding:60px 20px; font-size:14px; color:var(--muted); }

/* ══════════════════════════════════════════════════════════════════════════════
   Vertical snap-scroll viewer (replaces lightbox)
   ══════════════════════════════════════════════════════════════════════════════ */
.scroll-view {
  position: fixed; inset: 0; z-index: 100; background: #000;
  overflow-y: scroll; scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch; overscroll-behavior: none;
}
/* sticky overlay header */
.sv-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 101;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; padding-top: max(16px, env(safe-area-inset-top, 16px));
  background: linear-gradient(rgba(0,0,0,.55) 0%, transparent 100%);
  pointer-events: none;
}
.sv-header > * { pointer-events: auto; }
.sv-close {
  background: rgba(255,255,255,.12); border: none; border-radius: 50%;
  color: #fff; cursor: pointer; width: 36px; height: 36px; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  -webkit-tap-highlight-color: transparent;
}
.sv-close:active { opacity: 0.5; }
.sv-counter {
  font-size: 13px; color: rgba(255,255,255,.8); font-variant-numeric: tabular-nums;
  background: rgba(0,0,0,.4); border-radius: 12px; padding: 3px 10px;
}
/* each item fills the viewport and snaps */
.sv-item {
  height: 100dvh; scroll-snap-align: start;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.sv-item img   { max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; }
.sv-item video { max-width: 100%; max-height: 100%; }
/* TikTok-style right-side actions */
.sv-actions {
  position: absolute; bottom: 60px; right: 14px;
  display: flex; flex-direction: column; gap: 18px; align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.sv-fav {
  background: rgba(0,0,0,.5); border: none; border-radius: 50%;
  color: rgba(255,255,255,.8); cursor: pointer;
  width: 52px; height: 52px; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: color .18s, transform .15s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.sv-fav.active { color: var(--fav); }
.sv-fav:active { transform: scale(.85); }
/* label under the heart */
.sv-fav-label { font-size: 11px; color: rgba(255,255,255,.6); margin-top: -10px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="header">
  <div class="wordmark"><span class="conn-dot" id="dot"></span>media&#x2011;manager</div>
  <div class="input-row">
    <input id="url" class="url-input" type="url"
      placeholder="mega.nz/… or instagram.com/…"
      autocomplete="off" autocorrect="off" autocapitalize="none"
      spellcheck="false" enterkeyhint="go">
    <button class="add-btn" id="addbtn" onclick="addJob()">+</button>
  </div>
  <div class="page-tabs">
    <button class="page-tab active" data-page="downloads" onclick="setPage('downloads')">Downloads</button>
    <button class="page-tab"        data-page="favorites" onclick="setPage('favorites')">&#9829; Favorites</button>
  </div>
</div>

<!-- ── Content area ────────────────────────────────────────── -->
<div class="content-wrap">

  <!-- Downloads page -->
  <div id="page-downloads" class="page">
    <div class="jobs" id="jobs">
      <div class="empty" id="empty">
        <div class="empty-icon">⬇</div>
        <div class="empty-text">Paste a Mega or Instagram link<br>to start downloading</div>
      </div>
    </div>
  </div>

  <!-- Favorites page -->
  <div id="page-favorites" class="page" style="display:none">
    <div id="favs-grid" class="media-grid"></div>
  </div>

</div>

<!-- ── Media browser overlay ───────────────────────────────── -->
<div id="browser" class="browser" style="display:none">
  <div class="br-header">
    <button class="br-back" onclick="closeBrowser()" aria-label="Back">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="br-title">
      <div class="br-title-main" id="br-name"></div>
      <div class="br-title-sub"  id="br-sub"></div>
    </div>
    <span class="br-count" id="br-count"></span>
  </div>
  <div class="br-tabs" id="br-tabs" style="display:none"></div>
  <div class="br-body">
    <div class="media-grid" id="br-grid">
      <div class="br-loading">Loading…</div>
    </div>
  </div>
</div>

<!-- ── Vertical scroll viewer ──────────────────────────────── -->
<div id="scroll-view" class="scroll-view" style="display:none">
  <div class="sv-header">
    <button class="sv-close" onclick="closeScrollView()">✕</button>
    <span class="sv-counter" id="sv-counter"></span>
  </div>
  <div id="sv-items"></div>
</div>

<script>
// ── Global state ───────────────────────────────────────────────────────────────
const jobs = {};
let ws, reconnTimer;
let currentPage = 'downloads';

// Favorites
let favs = [];
let favsByUrl = {}; // url → Favorite

// Browser
let brJobId   = null;
let allItems  = [];  // MediaItem[] for current browser
let viewItems = [];  // filtered by tab
let activeGroup = 'all';

// Scroll viewer
let svItems   = [];  // current items (MediaItem | Favorite)
let svObserver = null;

// ── WebSocket ──────────────────────────────────────────────────────────────────
function connect() {
  clearTimeout(reconnTimer);
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen  = () => setDot('live');
  ws.onclose = () => { setDot('dead'); reconnTimer = setTimeout(connect, 2500); };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'snapshot') {
      msg.jobs.forEach(j => { jobs[j.id] = j; });
      renderAll();
    } else if (msg.type === 'update') {
      const isNew = !jobs[msg.job.id];
      jobs[msg.job.id] = msg.job;
      if (isNew) renderAll(); else updateCard(msg.job);
    }
  };
}
function setDot(s) { document.getElementById('dot').className = 'conn-dot ' + s; }

// ── Page tabs ──────────────────────────────────────────────────────────────────
function setPage(p) {
  currentPage = p;
  document.getElementById('page-downloads').style.display = p === 'downloads' ? '' : 'none';
  document.getElementById('page-favorites').style.display = p === 'favorites'  ? '' : 'none';
  document.querySelectorAll('.page-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.page === p)
  );
  if (p === 'favorites') renderFavsGrid();
}

// ── Job cards ──────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('jobs');
  const empty = document.getElementById('empty');
  const list = Object.values(jobs).sort((a, b) => b.created_at - a.created_at);
  if (!list.length) {
    empty.style.display = '';
    [...container.children].forEach(c => { if (c.id !== 'empty') c.remove(); });
    return;
  }
  empty.style.display = 'none';
  list.forEach((job, i) => {
    let card = document.getElementById('c-' + job.id);
    if (!card) {
      card = document.createElement('div');
      card.id = 'c-' + job.id;
      container.insertBefore(card, container.children[i] || null);
    }
    fillCard(card, job);
  });
}

function updateCard(job) {
  const card = document.getElementById('c-' + job.id);
  if (card) fillCard(card, job); else renderAll();
}

function fillCard(card, job) {
  const badgeCls   = job.source === 'instagram' ? 'badge-ig' : job.source === 'mega' ? 'badge-mega' : 'badge-uk';
  const badgeLabel = job.source === 'instagram' ? 'IG' : job.source === 'mega' ? 'MEGA' : '?';
  const canCancel  = job.status === 'queued' || job.status === 'downloading';
  const stLabel    = { queued:'Queued', downloading:'Downloading', done:'Done', failed:'Failed', cancelled:'Cancelled' }[job.status] || job.status;
  const pct = job.progress;
  const indeterminate = job.status === 'downloading' && pct == null;
  const pWidth = indeterminate ? '' : `width:${pct != null ? pct.toFixed(1) : 0}%`;
  const canBrowse = job.status !== 'queued';

  card.className = `card s-${job.status}`;
  card.innerHTML = `
    <div class="card-body">
      <div class="card-top">
        <span class="badge ${badgeCls}">${badgeLabel}</span>
        <span class="card-url">${esc(job.url)}</span>
        ${canCancel ? `<button class="cancel-btn" onclick="cancelJob('${job.id}')" title="Cancel">✕</button>` : ''}
      </div>
      <div class="card-status">
        <div class="dot"></div>
        <span class="status-label">${stLabel}</span>
        ${job.files_done > 0 ? `<span class="files-pill">${job.files_done} file${job.files_done !== 1 ? 's' : ''}</span>` : ''}
      </div>
      <div class="card-msg">${job.message ? esc(job.message) : ''}</div>
    </div>
    <div class="pbar">
      <div class="pfill${indeterminate ? ' shimmer' : ''}" style="${indeterminate ? '' : pWidth}"></div>
    </div>
    ${canBrowse ? `
    <div class="browse-row" onclick="openBrowser('${job.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Browse media
    </div>` : ''}
  `;
}

// ── Queue / cancel ─────────────────────────────────────────────────────────────
async function addJob() {
  const input = document.getElementById('url');
  const url = input.value.trim();
  if (!url) return;
  const btn = document.getElementById('addbtn');
  btn.disabled = true; btn.textContent = '…';
  try {
    await fetch('/api/queue', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
    input.value = '';
  } catch(_) {}
  btn.disabled = false; btn.textContent = '+';
  input.focus();
}

async function cancelJob(id) {
  try { await fetch(`/api/jobs/${id}/cancel`, { method:'POST' }); } catch(_) {}
}

document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') addJob(); });

// ── Favorites ─────────────────────────────────────────────────────────────────
async function loadFavs() {
  try {
    const r = await fetch('/api/favorites');
    favs = await r.json();
    favsByUrl = {};
    favs.forEach(f => { favsByUrl[f.url] = f; });
  } catch(_) { favs = []; }
}

async function toggleFav(item, btn) {
  const existing = favsByUrl[item.url];
  if (existing) {
    try {
      await fetch(`/api/favorites/${existing.id}`, { method: 'DELETE' });
      delete favsByUrl[item.url];
      favs = favs.filter(f => f.id !== existing.id);
      // update every heart button showing this url
      document.querySelectorAll('.sv-fav').forEach(b => {
        if (b.dataset.url === item.url) b.classList.remove('active');
      });
      if (currentPage === 'favorites') renderFavsGrid();
    } catch(_) {}
  } else {
    try {
      const r = await fetch('/api/favorites', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ url: item.url, kind: item.kind, name: item.name }),
      });
      const fav = await r.json();
      favs.push(fav);
      favsByUrl[fav.url] = fav;
      document.querySelectorAll('.sv-fav').forEach(b => {
        if (b.dataset.url === item.url) b.classList.add('active');
      });
    } catch(_) {}
  }
}

function renderFavsGrid() {
  const grid = document.getElementById('favs-grid');
  grid.innerHTML = '';
  if (!favs.length) {
    grid.innerHTML = `<div class="favs-empty" style="grid-column:1/-1">
      <span class="favs-empty-icon">♥</span>
      No favorites yet.<br>Heart items while browsing.
    </div>`;
    return;
  }
  favs.slice().reverse().forEach((fav, i) => {
    const idx = favs.length - 1 - i; // real index in favs array
    const thumb = makeThumbnail(fav, () => openScrollView(favs, idx));
    grid.appendChild(thumb);
  });
}

// ── Media browser ──────────────────────────────────────────────────────────────
async function openBrowser(id) {
  brJobId = id;
  activeGroup = 'all';
  const job = jobs[id];

  document.getElementById('br-name').textContent = job.url.replace(/^https?:\/\/(www\.)?/, '');
  document.getElementById('br-sub').textContent = { instagram:'Instagram', mega:'Mega.nz', unknown:'Download' }[job.source] || 'Download';
  document.getElementById('br-count').textContent = '';
  document.getElementById('br-grid').innerHTML = '<div class="br-loading">Loading…</div>';
  document.getElementById('br-tabs').style.display = 'none';

  document.getElementById('browser').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  try {
    const r = await fetch(`/api/jobs/${id}/media`);
    allItems = await r.json();
  } catch(_) { allItems = []; }

  buildTabs();
  applyFilter();
  renderBrGrid();
}

function closeBrowser() {
  document.getElementById('browser').style.display = 'none';
  document.body.style.overflow = '';
  document.querySelectorAll('#br-grid video').forEach(v => { v.pause(); v.removeAttribute('src'); v.load(); });
}

function buildTabs() {
  const tabs = document.getElementById('br-tabs');
  const hasImages = allItems.some(i => i.kind === 'image');
  const hasVideos = allItems.some(i => i.kind === 'video');
  if (!hasImages || !hasVideos) { tabs.style.display = 'none'; return; }

  tabs.style.display = '';
  tabs.innerHTML = '';
  [['all', 'All'], ['image', 'Images'], ['video', 'Videos']].forEach(([val, label]) => {
    const btn = document.createElement('button');
    btn.className = 'br-tab' + (val === activeGroup ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      activeGroup = val;
      applyFilter();
      renderBrGrid();
      tabs.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t === btn));
    };
    tabs.appendChild(btn);
  });
}

function applyFilter() {
  viewItems = activeGroup === 'all' ? allItems : allItems.filter(i => i.kind === activeGroup);
  document.getElementById('br-count').textContent = viewItems.length + (viewItems.length === 1 ? ' item' : ' items');
}

function renderBrGrid() {
  const grid = document.getElementById('br-grid');
  grid.innerHTML = '';
  if (!viewItems.length) {
    grid.innerHTML = '<div class="br-empty">No photos or videos found.<br>Files may still be downloading.</div>';
    return;
  }
  viewItems.forEach((item, i) => {
    grid.appendChild(makeThumbnail(item, () => openScrollView(viewItems, i)));
  });
}

function makeThumbnail(item, onclick) {
  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  thumb.onclick = onclick;
  if (item.kind === 'video') {
    const vid = document.createElement('video');
    vid.src = item.url; vid.preload = 'metadata'; vid.muted = true; vid.playsInline = true;
    thumb.appendChild(vid);
    const badge = document.createElement('div');
    badge.className = 'play-badge'; badge.textContent = '▶';
    thumb.appendChild(badge);
  } else {
    const img = document.createElement('img');
    img.loading = 'lazy'; img.decoding = 'async'; img.src = item.url; img.alt = item.name || '';
    thumb.appendChild(img);
  }
  return thumb;
}

// ── Vertical scroll viewer ────────────────────────────────────────────────────
function openScrollView(items, startIdx) {
  svItems = items;

  // tear down any previous session
  if (svObserver) { svObserver.disconnect(); svObserver = null; }
  document.querySelectorAll('#sv-items video').forEach(v => { v.pause(); v.src = ''; });

  const container = document.getElementById('sv-items');
  container.innerHTML = '';

  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'sv-item';
    div.dataset.idx = i;

    if (item.kind === 'video') {
      const vid = document.createElement('video');
      // lazy: set data-src, observer will promote to src when near viewport
      vid.dataset.src = item.url;
      vid.loop = true; vid.playsInline = true; vid.controls = true;
      div.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.loading = 'lazy'; img.decoding = 'async';
      img.src = item.url; img.alt = item.name || '';
      div.appendChild(img);
    }

    // Heart button
    const actions = document.createElement('div');
    actions.className = 'sv-actions';
    const favBtn = document.createElement('button');
    favBtn.className = 'sv-fav' + (favsByUrl[item.url] ? ' active' : '');
    favBtn.dataset.url = item.url;
    favBtn.innerHTML = '♥';
    favBtn.title = 'Favorite';
    favBtn.onclick = e => { e.stopPropagation(); toggleFav(item, favBtn); };
    actions.appendChild(favBtn);
    div.appendChild(actions);

    container.appendChild(div);
  });

  const sv = document.getElementById('scroll-view');
  sv.style.display = 'block';
  document.body.style.overflow = 'hidden';

  // Jump to start item (instant, before observer fires)
  const itemEls = container.querySelectorAll('.sv-item');
  if (startIdx > 0 && itemEls[startIdx]) {
    itemEls[startIdx].scrollIntoView({ behavior: 'instant' });
  }

  // Update counter for start item immediately
  const total = items.length;
  document.getElementById('sv-counter').textContent = `${startIdx + 1} / ${total}`;

  // IntersectionObserver: autoplay video + update counter + lazy-load
  svObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const el = entry.target;
      const idx = parseInt(el.dataset.idx);
      const vid = el.querySelector('video');
      if (entry.isIntersecting) {
        document.getElementById('sv-counter').textContent = `${idx + 1} / ${total}`;
        // Lazy-load video src
        if (vid && vid.dataset.src) {
          vid.src = vid.dataset.src;
          vid.removeAttribute('data-src');
        }
        if (vid) vid.play().catch(() => {});
      } else {
        if (vid && vid.src) vid.pause();
      }
    });
  }, { threshold: 0.5 });

  itemEls.forEach(el => svObserver.observe(el));
}

function closeScrollView() {
  if (svObserver) { svObserver.disconnect(); svObserver = null; }
  document.querySelectorAll('#sv-items video').forEach(v => { v.pause(); v.src = ''; });
  document.getElementById('scroll-view').style.display = 'none';
  document.body.style.overflow = '';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (document.getElementById('scroll-view').style.display !== 'none') {
    if (e.key === 'Escape') closeScrollView();
  } else if (document.getElementById('browser').style.display !== 'none') {
    if (e.key === 'Escape') closeBrowser();
  }
});

// ── Util ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
connect();
loadFavs();
</script>
